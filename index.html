<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PascuFinanzas | Analytics v1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; transition: background-color 0.3s; }
        .dark body { background-color: #020617; color: #f1f5f9; }
        .bento-card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .dark .bento-card { background: #0f172a; border: 1px solid #1e293b; }
        .input-pro { background: #f1f5f9; border-radius: 12px; padding: 12px; width: 100%; outline: none; border: 2px solid transparent; transition: 0.2s; }
        .dark .input-pro { background: #1e293b; color: white; }
        .input-pro:focus { border-color: #3b82f6; background: white; }
        .dark .input-pro:focus { background: #1e293b; }
        
        /* Panel de Gráficos */
        .analytics-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100%; background: white; z-index: 50; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.1); padding: 24px; display: flex; flex-direction: column; overflow-y: auto; }
        .dark .analytics-panel { background: #0f172a; box-shadow: -20px 0 50px rgba(0,0,0,0.5); border-left: 1px solid #1e293b; }
        .analytics-panel.open { right: 0; }
        
        .chart-container { position: relative; margin-bottom: 32px; background: #f8fafc; border-radius: 20px; padding: 16px; border: 1px solid #f1f5f9; }
        .dark .chart-container { background: #1e293b33; border: 1px solid #ffffff0a; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- PANEL DE ANALÍTICA (Pop-up Lateral) -->
    <div id="analytics-panel" class="analytics-panel">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black text-blue-600 uppercase italic">Analytics</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Visualización de Patrimonio</p>
            </div>
            <button onclick="toggleAnalytics()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-xl hover:bg-slate-200 transition-colors">✕</button>
        </div>
        
        <div class="space-y-6">
            <!-- Gráfico 1: Distribución -->
            <div class="chart-container">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Distribución de Activos</h3>
                <canvas id="distributionChart"></canvas>
            </div>

            <!-- Gráfico 2: Evolución -->
            <div class="chart-container">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Proyección Mensual (Estimada)</h3>
                <canvas id="growthChart"></canvas>
            </div>

            <!-- Resumen de Métricas -->
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-emerald-500/10 rounded-2xl border border-emerald-500/20">
                    <p class="text-[9px] font-black text-emerald-600 uppercase mb-1">Activo Mayor</p>
                    <p id="top-asset" class="font-bold text-sm truncate">-</p>
                </div>
                <div class="p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20">
                    <p class="text-[9px] font-black text-blue-600 uppercase mb-1">Diversificación</p>
                    <p id="diversity-score" class="font-bold text-sm">-</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">PASCU<span class="text-blue-600">FINANZAS</span></h1>
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.3em]">Patrimonio & Estrategia</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAnalytics()" class="group relative w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl shadow-xl shadow-blue-600/30 hover:scale-105 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                </button>
                <button onclick="document.documentElement.classList.toggle('dark')" class="w-14 h-14 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center text-2xl border border-slate-100 dark:border-slate-800 shadow-sm">🌓</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bento-card col-span-1 md:col-span-2">
                <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Nuevo Activo</h3>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="asset-name" placeholder="Ej: Cuenta Ahorro, BTC, Acciones..." class="input-pro">
                    <input type="number" id="asset-value" placeholder="Valor (€)" class="input-pro">
                    <button onclick="addAsset()" class="bg-slate-900 dark:bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-all">Añadir</button>
                </div>
            </div>
            <div class="bento-card flex flex-col justify-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Balance Total</h3>
                <p id="total-val" class="text-4xl font-black text-slate-900 dark:text-white">0.00 €</p>
            </div>
        </div>

        <div class="bento-card min-h-[400px]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Listado de Activos</h3>
                <span id="asset-count" class="text-[10px] bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full font-bold">0 ACTIVOS</span>
            </div>
            <div id="asset-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('pascu_assets')) || [];
        let distChart, growthChart;

        function toggleAnalytics() { 
            const panel = document.getElementById('analytics-panel');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) {
                updateCharts();
            }
        }

        function render() {
            const list = document.getElementById('asset-list');
            const totalEl = document.getElementById('total-val');
            const countEl = document.getElementById('asset-count');
            let total = 0;
            
            list.innerHTML = portfolio.map((a, i) => {
                total += a.val;
                return `
                    <div class="group flex justify-between items-center p-5 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 hover:border-blue-400 transition-all">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${a.name}</p>
                            <p class="font-black text-xl">${a.val.toLocaleString()} <span class="text-sm font-normal text-slate-400">€</span></p>
                        </div>
                        <button onclick="deleteAsset(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-300 hover:bg-red-50 hover:text-red-500 dark:hover:bg-red-900/20 transition-all">✕</button>
                    </div>
                `;
            }).join('') || `
                <div class="col-span-full py-20 text-center opacity-30">
                    <p class="italic">Tu cartera está vacía</p>
                </div>
            `;
            
            totalEl.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " €";
            countEl.innerText = `${portfolio.length} ACTIVOS`;
            localStorage.setItem('pascu_assets', JSON.stringify(portfolio));
            
            // Actualizar métricas rápidas
            if(portfolio.length > 0) {
                const max = portfolio.reduce((prev, current) => (prev.val > current.val) ? prev : current);
                document.getElementById('top-asset').innerText = `${max.name} (${((max.val/total)*100).toFixed(1)}%)`;
                document.getElementById('diversity-score').innerText = portfolio.length > 3 ? "Alta" : "Mejorable";
            }
        }

        function addAsset() {
            const name = document.getElementById('asset-name').value.trim();
            const val = parseFloat(document.getElementById('asset-value').value);
            if (!name || isNaN(val)) return;
            portfolio.push({ name, val });
            document.getElementById('asset-name').value = '';
            document.getElementById('asset-value').value = '';
            render();
        }

        function deleteAsset(i) {
            portfolio.splice(i, 1);
            render();
        }

        function updateCharts() {
            const ctxDist = document.getElementById('distributionChart').getContext('2d');
            const ctxGrowth = document.getElementById('growthChart').getContext('2d');
            
            const labels = portfolio.map(a => a.name);
            const data = portfolio.map(a => a.val);
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#64748b';

            // Limpiar si ya existen
            if(distChart) distChart.destroy();
            if(growthChart) growthChart.destroy();

            // Gráfico Circular de Distribución
            distChart = new Chart(ctxDist, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Outfit', weight: 'bold', size: 10 } } }
                    },
                    cutout: '70%'
                }
            });

            // Gráfico Lineal de Crecimiento (Simulación)
            const total = data.reduce((a, b) => a + b, 0);
            const mockGrowth = Array.from({length: 6}, (_, i) => total * (1 + (i * 0.02))); // 2% crecimiento mensual estimado

            growthChart = new Chart(ctxGrowth, {
                type: 'line',
                data: {
                    labels: ['Mes 1', 'Mes 2', 'Mes 3', 'Mes 4', 'Mes 5', 'Mes 6'],
                    datasets: [{
                        label: 'Proyección 6 meses',
                        data: mockGrowth,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: textColor, font: { size: 9 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = render;
    </script>
</body>
</html>
