<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PascuFinanzas | Pro Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#3b82f6', dark: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .dark body { background-color: #020617; }
        
        .bento-card { 
            background: white; border-radius: 28px; padding: 24px;
            box-shadow: 0 4px 25px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
        }
        .dark .bento-card { background: #0f172a; border: 1px solid #1e293b; }
        
        .input-pro {
            background: #f1f5f9; border: 2px solid transparent; border-radius: 16px;
            padding: 14px 18px; font-weight: 600; width: 100%; outline: none; transition: all 0.2s;
            font-size: 16px; color: #1e293b;
        }
        .dark .input-pro { background: #1e293b; color: #f1f5f9; }
        .input-pro:focus { border-color: #3b82f6; background: white; }

        .tab-btn { 
            flex: 1; text-align: center;
            padding: 12px 6px; border-radius: 14px; font-weight: 700; font-size: 11px; 
            color: #64748b; transition: all 0.2s;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .ai-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100%;
            background: white; z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 24px; overflow-y: auto;
        }
        .dark .ai-panel { background: #0f172a; border-left: 1px solid #1e293b; }
        .ai-panel.open { right: 0; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-once { animation: spin 0.6s ease-in-out; }

        /* Estilo para barra de progreso de objetivos */
        .progress-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
        .dark .progress-bar { background: #1e293b; }
        .progress-fill { height: 100%; background: #3b82f6; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen text-slate-900 dark:text-slate-100 pb-24 md:pb-10">

    <!-- PANEL OBJETIVOS (MODAL MÓVIL) -->
    <div id="goals-hub" class="ai-panel">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-black italic uppercase leading-none text-blue-500">MIS OBJETIVOS</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Metas Financieras</p>
            </div>
            <button onclick="toggleGoals()" class="w-12 h-12 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold">✕</button>
        </div>
        <div id="goals-list-mobile" class="space-y-4">
            <!-- Se llena con JS -->
        </div>
        <div class="mt-10 p-6 bg-slate-50 dark:bg-slate-800/50 rounded-3xl">
            <h3 class="text-xs font-black uppercase mb-4 tracking-tighter">Añadir Meta</h3>
            <div class="space-y-3">
                <input type="text" id="goal-name" placeholder="Nombre (ej: Casa)" class="input-pro">
                <input type="number" id="goal-target" placeholder="Objetivo (€)" class="input-pro">
                <button onclick="addGoal()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl text-xs uppercase">Crear Objetivo</button>
            </div>
        </div>
    </div>

    <!-- PANEL IA -->
    <div id="ai-hub" class="ai-panel">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-black italic uppercase leading-none text-blue-500">IA ANALISTA</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Generado por Gemini</p>
            </div>
            <button onclick="toggleAI()" class="w-12 h-12 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold">✕</button>
        </div>
        <div class="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-3xl border border-blue-100 dark:border-blue-800 mb-6 text-sm font-medium leading-relaxed italic" id="ai-analysis">
            Haz clic en analizar para obtener un diagnóstico de tu diversificación.
        </div>
        <button onclick="analyzePortfolio()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-lg shadow-blue-500/20">Auditar Cartera</button>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-blue-600 rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-xl shadow-blue-500/30">P</div>
                <div>
                    <h1 class="text-4xl font-black tracking-tighter uppercase italic leading-none">PASCU<span class="text-blue-600">FINANZAS</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-2">Wealth Management</p>
                </div>
            </div>
            
            <div class="flex flex-row-reverse md:flex-row w-full md:w-auto items-center justify-between md:justify-end gap-6">
                <div class="flex items-center gap-3">
                    <button onclick="toggleAI()" class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/25 text-xl">🤖</button>
                    <button onclick="toggleDarkMode()" class="w-14 h-14 border border-slate-200 dark:border-slate-800 rounded-2xl flex items-center justify-center bg-white dark:bg-slate-900 text-xl shadow-sm">🌓</button>
                </div>
                <div class="text-left md:text-right">
                    <div class="flex items-center gap-2 justify-end">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Patrimonio Neto</p>
                        <button onclick="togglePrivacy()" class="text-slate-400 hover:text-blue-500">👁️</button>
                    </div>
                    <p id="total-neto" class="text-4xl font-black tabular-nums tracking-tighter text-slate-900 dark:text-white transition-all duration-300">0.00 €</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-8">
                <!-- REGISTRO -->
                <div class="bento-card">
                    <h2 class="text-[11px] font-black uppercase tracking-widest mb-6 text-slate-400">Registrar Activo</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                        <select id="input-category" class="input-pro">
                            <option value="banco">🏦 Banco</option>
                            <option value="inversiones">📈 Inversión</option>
                            <option value="cripto" selected>₿ Crypto</option>
                        </select>
                        <input type="text" id="input-name" placeholder="Nombre/Ticker" class="input-pro">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <input type="number" id="input-val1" placeholder="Cantidad" class="input-pro">
                        <input type="number" id="input-val2" placeholder="Precio Compra" class="input-pro">
                    </div>
                    <button onclick="addItem()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-sm uppercase tracking-widest">Añadir Activo</button>
                </div>

                <!-- LISTADO -->
                <div class="bento-card">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex gap-2 p-1 bg-slate-100 dark:bg-slate-800 rounded-2xl w-full mr-4">
                            <button onclick="setTab('banco')" id="tab-banco" class="tab-btn">Bancos</button>
                            <button onclick="setTab('inversiones')" id="tab-inv" class="tab-btn">Bolsa</button>
                            <button onclick="setTab('cripto')" id="tab-cri" class="tab-btn active">Tokens</button>
                        </div>
                    </div>
                    <div id="list-container" class="space-y-3"></div>
                </div>
            </div>

            <!-- LATERAL -->
            <div class="lg:col-span-5 space-y-8">
                <!-- RIESGO -->
                <div class="bento-card">
                    <h2 class="text-[11px] font-black uppercase tracking-widest mb-8 text-slate-400">Riesgo & Diversificación</h2>
                    <div class="h-10 w-full bg-slate-100 dark:bg-slate-800 rounded-xl overflow-hidden flex mb-6">
                        <div id="bar-b" class="h-full bg-slate-400 transition-all duration-1000" style="width: 0%"></div>
                        <div id="bar-i" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div>
                        <div id="bar-c" class="h-full bg-blue-400 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="p-3 bg-slate-50 dark:bg-slate-800/30 rounded-xl text-center">
                            <p id="p-b" class="text-sm font-black">0%</p>
                        </div>
                        <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl text-center">
                            <p id="p-i" class="text-sm font-black text-blue-600">0%</p>
                        </div>
                        <div class="p-3 bg-blue-50 dark:bg-blue-400/10 rounded-xl text-center">
                            <p id="p-c" class="text-sm font-black text-blue-400">0%</p>
                        </div>
                    </div>
                </div>

                <!-- OBJETIVOS PC -->
                <div class="bento-card hidden lg:block">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-[11px] font-black uppercase tracking-widest text-slate-400">Objetivos</h2>
                        <button onclick="toggleGoals()" class="text-[10px] font-black text-blue-500 uppercase">+ Nuevo</button>
                    </div>
                    <div id="goals-list-pc" class="space-y-6">
                        <!-- Se llena con JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTONES MÓVILES FLOTANTES -->
    <div class="fixed bottom-6 right-6 flex items-center gap-3 lg:hidden">
        <button onclick="toggleGoals()" class="w-16 h-16 bg-white dark:bg-slate-800 text-2xl flex items-center justify-center rounded-full shadow-2xl border border-slate-200 dark:border-slate-700 active:scale-90 transition-transform">🎯</button>
        <button onclick="toggleAI()" class="w-16 h-16 bg-blue-600 text-white text-2xl flex items-center justify-center rounded-full shadow-2xl active:scale-90 transition-transform">🤖</button>
    </div>

    <script>
        const apiKey = "";
        const modelName = "gemini-2.5-flash-preview-09-2025";

        let state = JSON.parse(localStorage.getItem('pascu_data_v2')) || {
            tab: 'cripto',
            isPrivate: false,
            portfolio: { banco: [], inversiones: [], cripto: [] },
            goals: [
                { id: 1, name: 'Fondo de Emergencia', target: 10000 },
                { id: 2, name: 'Libertad Financiera', target: 500000 }
            ]
        };

        const cryptoLogos = { 'btc': '1', 'eth': '279', 'sol': '4128', 'doge': '5', 'usdt': '1', 'bnb': '183' };

        async function analyzePortfolio() {
            const el = document.getElementById('ai-analysis');
            el.innerText = "...";
            const summary = JSON.stringify(state.portfolio);
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Analiza esta cartera en 2 líneas: ${summary}` }] }] })
            });
            const data = await res.json();
            el.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error al analizar.";
        }

        function togglePrivacy() { state.isPrivate = !state.isPrivate; render(); }
        function toggleAI() { document.getElementById('ai-hub').classList.toggle('open'); }
        function toggleGoals() { document.getElementById('goals-hub').classList.toggle('open'); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function addItem() {
            const cat = document.getElementById('input-category').value;
            const name = document.getElementById('input-name').value.toUpperCase();
            const v1 = parseFloat(document.getElementById('input-val1').value);
            const v2 = parseFloat(document.getElementById('input-val2').value) || 0;
            
            if(!name || isNaN(v1)) return;
            
            const item = { id: Date.now(), name };
            if(cat === 'cripto') { item.qty = v1; item.price = v2; } else { item.val = v1; }
            state.portfolio[cat].push(item);
            render();
        }

        function addGoal() {
            const name = document.getElementById('goal-name').value;
            const target = parseFloat(document.getElementById('goal-target').value);
            if(!name || !target) return;
            state.goals.push({ id: Date.now(), name, target });
            render();
            toggleGoals();
        }

        function deleteItem(cat, id) { state.portfolio[cat] = state.portfolio[cat].filter(i => i.id !== id); render(); }
        function deleteGoal(id) { state.goals = state.goals.filter(g => g.id !== id); render(); }

        function render() {
            localStorage.setItem('pascu_data_v2', JSON.stringify(state));
            
            const tB = state.portfolio.banco.reduce((a, b) => a + b.val, 0);
            const tI = state.portfolio.inversiones.reduce((a, b) => a + b.val, 0);
            const tC = state.portfolio.cripto.reduce((a, b) => a + (b.qty * b.price), 0);
            const neto = tB + tI + tC;

            document.getElementById('total-neto').innerText = state.isPrivate ? "•••• €" : neto.toLocaleString() + " €";
            
            const pb = neto ? (tB/neto)*100 : 0;
            const pi = neto ? (tI/neto)*100 : 0;
            const pc = neto ? (tC/neto)*100 : 0;
            
            document.getElementById('bar-b').style.width = pb + "%";
            document.getElementById('bar-i').style.width = pi + "%";
            document.getElementById('bar-c').style.width = pc + "%";
            document.getElementById('p-b').innerText = Math.round(pb) + "%";
            document.getElementById('p-i').innerText = Math.round(pi) + "%";
            document.getElementById('p-c').innerText = Math.round(pc) + "%";

            // Render Listas de Activos
            const container = document.getElementById('list-container');
            container.innerHTML = state.portfolio[state.tab].map(item => {
                const isC = state.tab === 'cripto';
                const val = isC ? item.qty * item.price : item.val;
                const logoId = isC ? cryptoLogos[item.name.toLowerCase()] : null;
                const logo = logoId 
                    ? `<img src="https://assets.coingecko.com/coins/images/${logoId}/small/${item.name.toLowerCase()}.png" class="w-full h-full object-contain">`
                    : `<span class="font-black text-blue-500">${item.name[0]}</span>`;

                return `
                <div class="flex justify-between items-center p-5 bg-slate-50 dark:bg-slate-800/40 rounded-2xl">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white dark:bg-slate-900 rounded-xl flex items-center justify-center overflow-hidden shadow-sm">${logo}</div>
                        <div>
                            <p class="font-bold text-sm leading-none mb-1">${item.name}</p>
                            ${isC ? `<p class="text-[10px] text-slate-400 font-bold uppercase">${item.qty} u.</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-black text-sm">${state.isPrivate ? '•••' : val.toLocaleString() + ' €'}</p>
                        <button onclick="deleteItem('${state.tab}', ${item.id})" class="text-slate-300">✕</button>
                    </div>
                </div>`;
            }).join('');

            // Render Objetivos
            const goalsHtml = state.goals.map(g => {
                const perc = Math.min((neto / g.target) * 100, 100).toFixed(1);
                return `
                <div class="group relative">
                    <div class="flex justify-between items-end mb-2">
                        <p class="text-xs font-black uppercase tracking-tighter">${g.name}</p>
                        <button onclick="deleteGoal(${g.id})" class="text-[10px] text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity">Eliminar</button>
                    </div>
                    <div class="progress-bar mb-2"><div class="progress-fill" style="width: ${perc}%"></div></div>
                    <div class="flex justify-between text-[10px] font-bold text-slate-400">
                        <span>${perc}% Completado</span>
                        <span>Meta: ${g.target.toLocaleString()}€</span>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('goals-list-pc').innerHTML = goalsHtml || '<p class="text-center text-xs text-slate-400 py-4 italic">No hay metas definidas.</p>';
            document.getElementById('goals-list-mobile').innerHTML = goalsHtml;
        }

        function setTab(t) {
            state.tab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (t === 'inversiones' ? 'inv' : t === 'cripto' ? 'cri' : 'banco')).classList.add('active');
            render();
        }

        window.onload = render;
    </script>
</body>
</html>
