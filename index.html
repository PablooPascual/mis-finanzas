<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PascuFinanzas | IA v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; transition: background-color 0.3s; }
        .dark body { background-color: #020617; color: #f1f5f9; }
        .bento-card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .dark .bento-card { background: #0f172a; border: 1px solid #1e293b; }
        .input-pro { background: #f1f5f9; border-radius: 12px; padding: 12px; width: 100%; outline: none; border: 2px solid transparent; transition: 0.2s; }
        .dark .input-pro { background: #1e293b; color: white; }
        .input-pro:focus { border-color: #3b82f6; background: white; }
        .dark .input-pro:focus { background: #1e293b; }
        .ai-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 50; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.1); padding: 24px; display: flex; flex-direction: column; }
        .dark .ai-panel { background: #0f172a; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        .ai-panel.open { right: 0; }
        .loader { width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- PANEL IA -->
    <div id="ai-panel" class="ai-panel">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black text-blue-600">AUDITORÍA IA</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Gemini Engine v2.5</p>
            </div>
            <button onclick="toggleAI()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-xl">✕</button>
        </div>
        
        <div id="ai-output" class="flex-grow bg-slate-50 dark:bg-slate-900/50 p-6 rounded-2xl text-sm leading-relaxed mb-6 overflow-y-auto border border-slate-100 dark:border-slate-800">
            <div class="text-center py-10 opacity-50">
                <span class="text-4xl block mb-4">📉</span>
                <p>Listo para analizar tu cartera financiera y detectar riesgos o áreas de mejora.</p>
            </div>
        </div>

        <div class="space-y-3">
            <button id="ai-btn" onclick="getAIAdvice()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-blue-500/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                Generar Informe
            </button>
            <p id="ai-status" class="text-[9px] text-center text-slate-400 font-bold uppercase tracking-tighter"></p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">PASCU<span class="text-blue-600">FINANZAS</span></h1>
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.3em]">Patrimonio & Estrategia</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAI()" class="group relative w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl shadow-xl shadow-blue-600/30 hover:scale-105 transition-all">
                    🤖
                    <span class="absolute -top-1 -right-1 flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                    </span>
                </button>
                <button onclick="document.documentElement.classList.toggle('dark')" class="w-14 h-14 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center text-2xl border border-slate-100 dark:border-slate-800 shadow-sm">🌓</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bento-card col-span-1 md:col-span-2">
                <h3 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Nuevo Activo</h3>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="asset-name" placeholder="Ej: Cuenta Ahorro, BTC, Acciones..." class="input-pro">
                    <input type="number" id="asset-value" placeholder="Valor (€)" class="input-pro">
                    <button onclick="addAsset()" class="bg-slate-900 dark:bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-all">Añadir</button>
                </div>
            </div>
            <div class="bento-card flex flex-col justify-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Balance Total</h3>
                <p id="total-val" class="text-4xl font-black text-slate-900 dark:text-white">0.00 €</p>
            </div>
        </div>

        <div class="bento-card min-h-[400px]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Distribución de Cartera</h3>
                <span id="asset-count" class="text-[10px] bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full font-bold">0 ACTIVOS</span>
            </div>
            <div id="asset-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const modelId = "gemini-2.5-flash-preview-09-2025";
        let portfolio = JSON.parse(localStorage.getItem('pascu_assets')) || [];

        function toggleAI() { document.getElementById('ai-panel').classList.toggle('open'); }

        function render() {
            const list = document.getElementById('asset-list');
            const totalEl = document.getElementById('total-val');
            const countEl = document.getElementById('asset-count');
            let total = 0;
            
            list.innerHTML = portfolio.map((a, i) => {
                total += a.val;
                return `
                    <div class="group flex justify-between items-center p-5 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 hover:border-blue-400 transition-all">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${a.name}</p>
                            <p class="font-black text-xl">${a.val.toLocaleString()} <span class="text-sm font-normal text-slate-400">€</span></p>
                        </div>
                        <button onclick="deleteAsset(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-300 hover:bg-red-50 hover:text-red-500 dark:hover:bg-red-900/20 transition-all">✕</button>
                    </div>
                `;
            }).join('') || `
                <div class="col-span-full py-20 text-center opacity-30">
                    <p class="italic">Tu cartera está vacía</p>
                </div>
            `;
            
            totalEl.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " €";
            countEl.innerText = `${portfolio.length} ACTIVOS`;
            localStorage.setItem('pascu_assets', JSON.stringify(portfolio));
        }

        function addAsset() {
            const name = document.getElementById('asset-name').value.trim();
            const val = parseFloat(document.getElementById('asset-value').value);
            if (!name || isNaN(val)) return;
            portfolio.push({ name, val });
            document.getElementById('asset-name').value = '';
            document.getElementById('asset-value').value = '';
            render();
        }

        function deleteAsset(i) {
            portfolio.splice(i, 1);
            render();
        }

        // FUNCIÓN DE LLAMADA CON RETROCESO EXPONENCIAL (Exigencia Google)
        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status === 429 || response.status >= 500) {
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        continue;
                    }
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `Error ${response.status}`);
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        async function getAIAdvice() {
            const btn = document.getElementById('ai-btn');
            const output = document.getElementById('ai-output');
            const status = document.getElementById('ai-status');

            if (portfolio.length === 0) {
                output.innerHTML = "⚠️ Debes añadir activos para realizar una auditoría.";
                return;
            }

            btn.disabled = true;
            status.innerText = "Conectando con Google Gemini...";
            output.innerHTML = '<div class="flex flex-col items-center justify-center h-full opacity-50"><div class="loader mb-4"></div><p>Analizando estructura de activos...</p></div>';

            try {
                const summary = portfolio.map(a => `${a.name}: ${a.val}€`).join(', ');
                const total = portfolio.reduce((acc, curr) => acc + curr.val, 0);

                const payload = {
                    contents: [{
                        parts: [{ 
                            text: `Eres un consultor financiero de élite. Mi cartera es: ${summary}. Patrimonio total: ${total}€. 
                            Analiza la diversificación, identifica riesgos y dame 3 consejos prácticos y directos para maximizar mi salud financiera. 
                            Responde en español con un formato limpio (usa negritas).` 
                        }]
                    }]
                };

                // Cambiamos el endpoint a uno más genérico si el específico de fecha falla
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
                
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (text) {
                    // Convertir markdown simple a HTML
                    output.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                    status.innerText = "Auditoría finalizada";
                } else {
                    throw new Error("Respuesta de IA vacía.");
                }

            } catch (err) {
                console.error("AI Error:", err);
                output.innerHTML = `
                    <div class="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/50 p-4 rounded-xl text-red-600 dark:text-red-400">
                        <p class="font-black text-xs uppercase mb-2">Fallo en la conexión</p>
                        <p class="text-xs leading-relaxed">${err.message}</p>
                        <button onclick="getAIAdvice()" class="mt-4 text-[10px] font-bold uppercase underline">Reintentar conexión ahora</button>
                    </div>
                `;
                status.innerText = "Error de servicio";
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
