<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PascuFinanzas | AI Dashboard</title>
    
    <!-- Configuración para App Móvil -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3b82f6">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#3b82f6', dark: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            touch-action: manipulation;
        }
        .dark body { background-color: #020617; }
        
        .bento-card { 
            background: white; border-radius: 28px; padding: 24px;
            box-shadow: 0 4px 25px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
        }
        .dark .bento-card { background: #0f172a; border: 1px solid #1e293b; }
        
        .input-pro {
            background: #f1f5f9; border: 2px solid transparent; border-radius: 16px;
            padding: 14px 18px; font-weight: 600; width: 100%; outline: none; transition: all 0.2s;
            font-size: 16px; color: #1e293b;
        }
        .dark .input-pro { background: #1e293b; color: #f1f5f9; }
        .input-pro:focus { border-color: #3b82f6; background: white; }
        .dark .input-pro:focus { background: #020617; color: white; }

        .tab-btn { 
            flex: 1; text-align: center;
            padding: 12px 6px; border-radius: 14px; font-weight: 700; font-size: 12px; 
            color: #64748b; transition: all 0.2s;
            text-transform: uppercase;
        }
        .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .ai-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100%;
            background: white; z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 24px; overflow-y: auto;
        }
        .dark .ai-panel { background: #0f172a; border-left: 1px solid #1e293b; }
        .ai-panel.open { right: 0; }

        .loading-dots:after {
            content: '.';
            animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-once { animation: spin 0.6s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen text-slate-900 dark:text-slate-100 pb-20">

    <!-- PANEL IA ESTRATÉGICA -->
    <div id="ai-hub" class="ai-panel">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-black italic uppercase leading-none"><span class="text-blue-500">IA</span> GESTIÓN</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Soporte Estratégico Pascu</p>
            </div>
            <button onclick="toggleAI()" class="w-12 h-12 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold">✕</button>
        </div>

        <div class="space-y-8">
            <div class="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-3xl border border-blue-100 dark:border-blue-800 shadow-sm">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">📊</span>
                    <h3 class="text-xs font-black uppercase tracking-widest text-blue-600">Analista de Diversificación</h3>
                </div>
                <p id="ai-status" class="text-sm font-medium leading-relaxed opacity-80 mb-6">Tu cartera está lista para ser analizada por la red Gemini.</p>
                <button id="btn-analyze" onclick="analyzePortfolio()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl text-xs uppercase tracking-widest active:scale-95 transition-all shadow-md shadow-blue-500/20">Generar Auditoría</button>
            </div>

            <div class="p-6 bg-slate-100 dark:bg-slate-800/40 rounded-3xl border border-transparent">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">🔮</span>
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">Crypto Oracle Pro</h3>
                </div>
                <div class="space-y-4">
                    <input type="text" id="oracle-coin" placeholder="Símbolo (BTC, SOL, ETH...)" class="input-pro">
                    <button onclick="runOracle()" id="btn-oracle" class="w-full py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-xl text-xs uppercase tracking-widest active:scale-95">Predecir Futuro</button>
                    <div id="oracle-output" class="hidden p-5 bg-white dark:bg-slate-900 rounded-2xl text-xs font-medium leading-relaxed border border-slate-200 dark:border-slate-700 shadow-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-blue-600 rounded-[22px] flex items-center justify-center text-white font-black text-3xl shadow-xl shadow-blue-500/30">P</div>
                <div>
                    <h1 class="text-4xl font-black tracking-tighter uppercase italic leading-none">PASCU<span class="text-blue-600">FINANZAS</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-2">Personal Wealth Manager</p>
                </div>
            </div>
            
            <div class="flex flex-row-reverse md:flex-row w-full md:w-auto items-center justify-between md:justify-end gap-6">
                <div class="flex items-center gap-3">
                    <button onclick="toggleAI()" class="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/25 active:scale-90 transition-transform text-xl">🤖</button>
                    <button onclick="toggleDarkMode()" class="w-14 h-14 border border-slate-200 dark:border-slate-800 rounded-2xl flex items-center justify-center bg-white dark:bg-slate-900 text-xl shadow-sm">🌓</button>
                </div>
                <div class="text-left md:text-right">
                    <div class="flex items-center gap-2 justify-end">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Patrimonio Neto</p>
                        <button onclick="togglePrivacy()" id="privacy-toggle" class="text-slate-400 hover:text-blue-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p id="total-neto" class="text-4xl font-black tabular-nums tracking-tighter text-slate-900 dark:text-white transition-all duration-300">0.00 €</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-8">
                <!-- FORMULARIO DE ENTRADA -->
                <div class="bento-card">
                    <h2 class="text-[11px] font-black uppercase tracking-widest mb-6 text-slate-400 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> Registrar Activo
                    </h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <select id="input-category" class="input-pro" onchange="toggleInputs()">
                                <option value="banco">🏦 Entidad Bancaria</option>
                                <option value="inversiones">📈 Bolsa / Fondos</option>
                                <option value="cripto" selected>₿ Criptomonedas</option>
                            </select>
                            <div class="relative">
                                <input type="text" id="input-name" list="crypto-list" placeholder="Símbolo (BTC, SOL...)" class="input-pro">
                                <datalist id="crypto-list">
                                    <option value="BTC">Bitcoin</option>
                                    <option value="ETH">Ethereum</option>
                                    <option value="SOL">Solana</option>
                                    <option value="DOGE">Dogecoin</option>
                                    <option value="USDT">Tether</option>
                                </datalist>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="input-val1" placeholder="Cantidad" class="input-pro">
                            <input type="number" id="input-val2" placeholder="Precio Compra" class="input-pro">
                        </div>
                        <button onclick="addItem()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl text-sm uppercase tracking-widest shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]">Añadir a Cartera</button>
                    </div>
                </div>

                <!-- LISTADO DE ACTIVOS -->
                <div class="bento-card">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex gap-2 p-1.5 bg-slate-100 dark:bg-slate-800/50 rounded-[22px] w-full mr-4">
                            <button onclick="setTab('banco')" id="tab-banco" class="tab-btn">Bancos</button>
                            <button onclick="setTab('inversiones')" id="tab-inv" class="tab-btn">Bolsa</button>
                            <button onclick="setTab('cripto')" id="tab-cri" class="tab-btn active">Tokens</button>
                        </div>
                        <button onclick="refreshCryptoPrices()" id="btn-refresh" class="w-12 h-12 bg-slate-100 dark:bg-slate-800 rounded-2xl flex items-center justify-center text-slate-500 hover:text-blue-500 transition-colors shadow-sm" title="Sincronizar Mercado">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </button>
                    </div>
                    <div id="list-container" class="space-y-3 min-h-[150px]"></div>
                </div>
            </div>

            <!-- LATERAL: ESTADÍSTICAS -->
            <div class="lg:col-span-5 space-y-8">
                <div class="bento-card">
                    <h2 class="text-[11px] font-black uppercase tracking-widest mb-8 text-slate-400">Distribución de Riesgo</h2>
                    <div class="h-14 w-full bg-slate-100 dark:bg-slate-800 rounded-2xl overflow-hidden flex mb-8 p-1.5 shadow-inner">
                        <div id="bar-b" class="h-full bg-slate-400 dark:bg-slate-500 rounded-xl transition-all duration-1000" style="width: 0%"></div>
                        <div id="bar-i" class="h-full bg-blue-600 rounded-xl mx-1 transition-all duration-1000" style="width: 0%"></div>
                        <div id="bar-c" class="h-full bg-blue-400 rounded-xl transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-slate-50 dark:bg-slate-800/30 p-4 rounded-2xl text-center">
                            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Cash</p>
                            <p id="p-b" class="text-lg font-black">0%</p>
                        </div>
                        <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-2xl text-center">
                            <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">Bolsa</p>
                            <p id="p-i" class="text-lg font-black text-blue-600">0%</p>
                        </div>
                        <div class="bg-blue-50 dark:bg-blue-400/10 p-4 rounded-2xl text-center">
                            <p class="text-[9px] font-bold text-blue-300 uppercase mb-1">Cripto</p>
                            <p id="p-c" class="text-lg font-black text-blue-400">0%</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const apiKey = ""; // API Key de Gemini
        const modelName = "gemini-2.5-flash-preview-09-2025";

        let state = JSON.parse(localStorage.getItem('pascu_data')) || {
            tab: 'cripto',
            isPrivate: false,
            portfolio: { 
                banco: [{id: 1, name: 'Banco Santander', val: 5000}], 
                inversiones: [], 
                cripto: [
                    {id: 101, name: 'BTC', qty: 0.12, avgPrice: 42000, price: 65000},
                    {id: 102, name: 'ETH', qty: 1.5, avgPrice: 1800, price: 3400},
                    {id: 103, name: 'SOL', qty: 50, avgPrice: 85, price: 145},
                    {id: 104, name: 'DOGE', qty: 10000, avgPrice: 0.08, price: 0.16}
                ] 
            }
        };

        // Mapa de IDs para CoinGecko (Símbolo -> ID de API)
        const cryptoDataMap = {
            'btc': 'bitcoin', 'eth': 'ethereum', 'sol': 'solana', 'doge': 'dogecoin',
            'usdt': 'tether', 'bnb': 'binancecoin', 'xrp': 'ripple', 'ada': 'cardano',
            'dot': 'polkadot', 'link': 'chainlink', 'matic': 'polygon'
        };

        // --- FUNCIONES IA ---
        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "No disponible.";
            } catch (e) { return "Error IA."; }
        }

        async function analyzePortfolio() {
            const btn = document.getElementById('btn-analyze');
            const status = document.getElementById('ai-status');
            btn.disabled = true;
            status.innerHTML = '<span class="loading-dots italic">Analizando...</span>';
            const resumen = JSON.stringify(state.portfolio);
            const res = await callGemini(`Analiza brevemente esta cartera y da un consejo estratégico: ${resumen}. Máximo 2 frases.`);
            status.innerText = res;
            btn.disabled = false;
        }

        async function runOracle() {
            const coin = document.getElementById('oracle-coin').value;
            const output = document.getElementById('oracle-output');
            if(!coin) return;
            output.classList.remove('hidden');
            output.innerHTML = '<span class="loading-dots">Prediciendo...</span>';
            const res = await callGemini(`Predicción de precio para ${coin} en las próximas 24h basándote en análisis técnico. Muy breve.`);
            output.innerText = res;
        }

        // --- MERCADO CRIPTO ---
        async function refreshCryptoPrices() {
            const btn = document.getElementById('btn-refresh');
            btn.classList.add('animate-spin-once');
            setTimeout(() => btn.classList.remove('animate-spin-once'), 600);

            const uniqueSymbols = [...new Set(state.portfolio.cripto.map(c => c.name.toLowerCase()))];
            const ids = uniqueSymbols
                .map(s => cryptoDataMap[s] || null)
                .filter(id => id !== null)
                .join(',');

            if (!ids) return;

            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=eur`);
                const prices = await response.json();
                
                state.portfolio.cripto = state.portfolio.cripto.map(c => {
                    const geckoId = cryptoDataMap[c.name.toLowerCase()];
                    if (geckoId && prices[geckoId]) {
                        c.price = prices[geckoId].eur;
                    }
                    return c;
                });
                render();
            } catch (e) {
                console.error("No se pudo conectar con el mercado.");
            }
        }

        // --- INTERFAZ ---
        function toggleInputs() {
            const cat = document.getElementById('input-category').value;
            const v2 = document.getElementById('input-val2');
            v2.placeholder = (cat === 'cripto') ? "Precio Compra (€)" : "Valor Actual (€)";
        }

        function togglePrivacy() {
            state.isPrivate = !state.isPrivate;
            render();
        }

        function render() {
            localStorage.setItem('pascu_data', JSON.stringify(state));
            
            const tB = state.portfolio.banco.reduce((a, b) => a + b.val, 0);
            const tI = state.portfolio.inversiones.reduce((a, b) => a + b.val, 0);
            const tC = state.portfolio.cripto.reduce((a, b) => a + (b.qty * b.price), 0);
            const neto = tB + tI + tC;

            const netoEl = document.getElementById('total-neto');
            netoEl.innerText = state.isPrivate ? "••••• €" : neto.toLocaleString('es-ES', { minimumFractionDigits: 2 }) + " €";
            
            const pb = neto ? (tB/neto)*100 : 0;
            const pi = neto ? (tI/neto)*100 : 0;
            const pc = neto ? (tC/neto)*100 : 0;
            
            document.getElementById('bar-b').style.width = pb + "%";
            document.getElementById('bar-i').style.width = pi + "%";
            document.getElementById('bar-c').style.width = pc + "%";
            document.getElementById('p-b').innerText = Math.round(pb) + "%";
            document.getElementById('p-i').innerText = Math.round(pi) + "%";
            document.getElementById('p-c').innerText = Math.round(pc) + "%";

            const container = document.getElementById('list-container');
            
            if (state.tab === 'cripto') {
                container.innerHTML = state.portfolio.cripto.map(item => {
                    const valorActual = item.qty * item.price;
                    const invertido = item.qty * (item.avgPrice || item.price);
                    const pnlEuro = valorActual - invertido;
                    const pnlPerc = invertido ? (pnlEuro / invertido) * 100 : 0;
                    const isProfit = pnlEuro >= 0;
                    
                    // Lógica de Logo: Usar CoinGecko Assets
                    const symbolLower = item.name.toLowerCase();
                    const geckoId = cryptoDataMap[symbolLower];
                    
                    // Intentamos obtener el logo oficial, si no, generamos un avatar con la letra
                    const logoHtml = geckoId 
                        ? `<img src="https://assets.coingecko.com/coins/images/${
                            symbolLower === 'btc' ? '1' : 
                            symbolLower === 'eth' ? '279' : 
                            symbolLower === 'sol' ? '4128' : 
                            symbolLower === 'doge' ? '5' : '1'
                          }/small/${geckoId}.png" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML='<span class=\'font-black text-blue-500\'>${item.name[0]}</span>'">`
                        : `<span class="font-black text-blue-500">${item.name[0]}</span>`;

                    return `
                    <div class="p-6 bg-slate-50 dark:bg-slate-800/40 rounded-3xl border border-transparent hover:border-blue-500/20 transition-all">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-white dark:bg-slate-900 rounded-2xl flex items-center justify-center shadow-sm overflow-hidden">
                                    ${logoHtml}
                                </div>
                                <div>
                                    <p class="font-black text-xl uppercase leading-tight">${item.name}</p>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${item.qty.toLocaleString()} unidades</p>
                                </div>
                            </div>
                            <button onclick="deleteItem('cripto', ${item.id})" class="text-slate-300 hover:text-rose-500 p-2">✕</button>
                        </div>
                        
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Valoración Actual</p>
                                <p class="text-2xl font-black">${state.isPrivate ? '••••' : valorActual.toLocaleString()} €</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Rendimiento</p>
                                <p class="font-black ${isProfit ? 'text-emerald-500' : 'text-rose-500'}">
                                    ${state.isPrivate ? '•••' : (isProfit ? '+' : '') + pnlEuro.toLocaleString()} €
                                    <span class="text-[10px] block opacity-70">${pnlPerc.toFixed(2)}%</span>
                                </p>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('') || '<p class="text-center py-10 text-slate-400 italic">No tienes tokens</p>';
            } else {
                container.innerHTML = state.portfolio[state.tab].map(item => `
                    <div class="flex justify-between items-center p-5 bg-slate-50 dark:bg-slate-800/40 rounded-2xl">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-0.5">${state.tab}</p>
                            <p class="font-bold">${item.name}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <p class="font-black">${state.isPrivate ? '••• €' : item.val.toLocaleString() + ' €'}</p>
                            <button onclick="deleteItem('${state.tab}', ${item.id})" class="text-slate-300 hover:text-rose-500 p-2">✕</button>
                        </div>
                    </div>
                `).join('') || '<p class="text-center py-10 text-slate-400 italic">Lista vacía</p>';
            }
        }

        function addItem() {
            const cat = document.getElementById('input-category').value;
            const name = document.getElementById('input-name').value.toUpperCase();
            const v1 = parseFloat(document.getElementById('input-val1').value);
            const v2 = parseFloat(document.getElementById('input-val2').value) || 0;
            
            if(!name || isNaN(v1)) return;
            
            const item = { id: Date.now(), name };
            if(cat === 'cripto') { 
                item.qty = v1; 
                item.avgPrice = v2; 
                item.price = v2 || 1; 
            } else { 
                item.val = v1; 
            }

            state.portfolio[cat].push(item);
            render();
            if(cat === 'cripto') refreshCryptoPrices();
        }

        function deleteItem(cat, id) {
            state.portfolio[cat] = state.portfolio[cat].filter(i => i.id !== id);
            render();
        }

        function setTab(t) {
            state.tab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (t === 'inversiones' ? 'inv' : t === 'cripto' ? 'cri' : 'banco')).classList.add('active');
            render();
        }

        function toggleAI() { document.getElementById('ai-hub').classList.toggle('open'); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        
        window.onload = () => {
            render();
            refreshCryptoPrices();
        };
    </script>
</body>
</html>
