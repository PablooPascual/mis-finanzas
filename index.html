<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PascuFinanzas | IA v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .dark body { background-color: #020617; }
        .bento-card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #f1f5f9; transition: transform 0.2s; }
        .dark .bento-card { background: #0f172a; border: 1px solid #1e293b; color: white; }
        .input-pro { background: #f1f5f9; border-radius: 12px; padding: 12px; width: 100%; outline: none; border: 2px solid transparent; }
        .dark .input-pro { background: #1e293b; color: white; }
        .input-pro:focus { border-color: #3b82f6; }
        .ai-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 50; transition: 0.3s; box-shadow: -10px 0 30px rgba(0,0,0,0.05); padding: 20px; }
        .dark .ai-panel { background: #0f172a; }
        .ai-panel.open { right: 0; }
        .incognito-blur { filter: blur(6px); pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-8 dark:text-slate-100 min-h-screen">

    <!-- PANEL IA -->
    <div id="ai-panel" class="ai-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-blue-600">ANÁLISIS IA</h2>
            <button onclick="toggleAI()" class="text-2xl">✕</button>
        </div>
        <div id="ai-output" class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl text-sm leading-relaxed mb-6 min-h-[200px] overflow-y-auto">
            Pulsa el botón de abajo para que la IA revise tu estrategia financiera.
        </div>
        <button id="ai-btn" onclick="getAIAdvice()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-wider hover:bg-blue-700 transition-all disabled:opacity-50">
            Ejecutar Auditoría
        </button>
        <p id="ai-status" class="text-[10px] text-center mt-3 text-slate-400 uppercase font-bold tracking-widest"></p>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic">PASCU<span class="text-blue-600">FINANZAS</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">v5.0 Stable</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAI()" class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center text-xl">🤖</button>
                <button onclick="document.documentElement.classList.toggle('dark')" class="w-12 h-12 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center text-xl">🌓</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bento-card col-span-1 md:col-span-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Gestión de Activos</h3>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="asset-name" placeholder="Ej: Bitcoin o Ahorros" class="input-pro">
                    <input type="number" id="asset-value" placeholder="Valor (€)" class="input-pro">
                    <button onclick="addAsset()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Añadir</button>
                </div>
            </div>
            <div class="bento-card">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-2">Total Neto</h3>
                <p id="total-val" class="text-4xl font-black">0.00 €</p>
            </div>
        </div>

        <div class="bento-card min-h-[300px]">
            <h3 class="text-xs font-bold text-slate-400 uppercase mb-6 tracking-widest">Mi Cartera</h3>
            <div id="asset-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyBTt2SjLhdVyyduIOki_2Xd3nGBnKf_QIc"; // Inyectado automáticamente
        const modelId = "gemini-2.5-flash-preview-09-2025";
        let portfolio = JSON.parse(localStorage.getItem('pascu_assets')) || [];

        function toggleAI() { document.getElementById('ai-panel').classList.toggle('open'); }

        function render() {
            const list = document.getElementById('asset-list');
            const totalEl = document.getElementById('total-val');
            let total = 0;
            
            list.innerHTML = portfolio.map((a, i) => {
                total += a.val;
                return `
                    <div class="flex justify-between items-center p-4 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
                        <span class="font-bold uppercase text-sm">${a.name}</span>
                        <div class="flex items-center gap-4">
                            <span class="font-black text-blue-600">${a.val.toLocaleString()} €</span>
                            <button onclick="deleteAsset(${i})" class="text-slate-300 hover:text-red-500">✕</button>
                        </div>
                    </div>
                `;
            }).join('') || '<p class="text-center text-slate-400 py-10">No hay activos registrados.</p>';
            
            totalEl.innerText = total.toLocaleString() + " €";
            localStorage.setItem('pascu_assets', JSON.stringify(portfolio));
        }

        function addAsset() {
            const name = document.getElementById('asset-name').value;
            const val = parseFloat(document.getElementById('asset-value').value);
            if (!name || isNaN(val)) return;
            portfolio.push({ name, val });
            document.getElementById('asset-name').value = '';
            document.getElementById('asset-value').value = '';
            render();
        }

        function deleteAsset(i) {
            portfolio.splice(i, 1);
            render();
        }

        async function getAIAdvice() {
            const btn = document.getElementById('ai-btn');
            const output = document.getElementById('ai-output');
            const status = document.getElementById('ai-status');

            if (portfolio.length === 0) {
                output.innerHTML = "⚠️ Añade al menos un activo para que pueda analizar tu cartera.";
                return;
            }

            btn.disabled = true;
            status.innerText = "Conectando con el motor de Google...";
            output.innerHTML = "Iniciando análisis profundo...";

            try {
                const summary = portfolio.map(a => `${a.name}: ${a.val}€`).join(', ');
                const total = portfolio.reduce((acc, curr) => acc + curr.val, 0);

                const prompt = `Actúa como un experto asesor financiero. Mi cartera es: ${summary}. Total: ${total}€. 
                Dame 3 consejos específicos para mejorar mi salud financiera o diversificación basándote en estos datos. 
                Responde siempre en español, usa un tono profesional pero directo.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "Error en la API");
                }

                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    output.innerText = text;
                    status.innerText = "Análisis completado con éxito";
                } else {
                    throw new Error("No se recibió texto del modelo.");
                }

            } catch (err) {
                console.error("AI Error:", err);
                output.innerHTML = `
                    <div class="text-red-500 p-2">
                        <p class="font-bold uppercase text-xs mb-1">Error de conexión detectado</p>
                        <p class="text-[11px] opacity-80">${err.message}</p>
                        <div class="mt-4 text-slate-500 text-[10px]">
                            Suele ocurrir por:<br>
                            1. Límites de cuota excedidos (espera 1 minuto).<br>
                            2. Problemas temporales en los servidores de Google.<br>
                            3. Interrupción en la red local.
                        </div>
                    </div>
                `;
                status.innerText = "Error en el sistema";
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = render;
    </script>
</body>
</html>
